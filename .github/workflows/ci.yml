name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Validate command file exists
        run: test -f command/cowork.md

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Check docs coverage
        run: npm run docs:check

      - name: Run golden regression
        run: npm run golden:run -- --json
      
      - name: Validate install script
        run: |
          chmod +x install.sh
          bash -n install.sh
